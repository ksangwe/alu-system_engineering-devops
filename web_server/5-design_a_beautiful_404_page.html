<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Lost in the Stack</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0f172a;
    color: #e2e8f0;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    text-align: center;
  }
  .code {
    font-size: 8rem;
    font-weight: 700;
    letter-spacing: -0.05em;
    background: linear-gradient(135deg, #38bdf8, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 0;
  }
  .msg { font-size: 1.5rem; margin: 0.5rem 0 0; }
  .sub { color: #64748b; margin-top: 1rem; max-width: 30rem; line-height: 1.6; }
  a {
    margin-top: 2rem;
    padding: 0.7rem 1.6rem;
    border: 1px solid #334155;
    border-radius: 999px;
    color: #38bdf8;
    text-decoration: none;
  }
  a:hover { background: #1e293b; }
</style>
</head>
<body>
  <p class="code">404</p>
  <p class="msg">Ceci n'est pas une page</p>
  <p class="sub">The resource you requested took a wrong turn somewhere between the request and the response.</p>
  <a href="/">Back to safety</a>
</body>
</html>
